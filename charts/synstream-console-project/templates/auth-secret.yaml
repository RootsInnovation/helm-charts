{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: synstream-auth-secret
  labels:
    {{- include "synstream.componentLabels" (dict "name" "synstream-auth" "workloadType" "deployment" "Chart" .Chart "Release" .Release) | nindent 4 }}
type: Opaque
stringData:
  # Secrets for the auth service. Supply real values via --set, a values
  # override, or an external/sealed secret. Empty values make the auth service
  # fail fast at startup instead of booting with an insecure default.
  JWT_SECRET_KEY: {{ .Values.auth.secrets.jwtSecretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.auth.secrets.encryptionKey | quote }}
{{- end }}
