{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: synstream-auth-secret
  labels:
    {{- include "synstream.componentLabels" (dict "name" "synstream-auth" "workloadType" "statefulset" "Chart" .Chart "Release" .Release) | nindent 4 }}
type: Opaque
stringData:
  # Secrets for the auth service. Supply a real value via --set, a values
  # override, or an external/sealed secret. An empty value makes the auth
  # service fail fast at startup instead of booting with an insecure default.
  JWT_SECRET_KEY: {{ .Values.auth.secrets.jwtSecretKey | quote }}
{{- end }}
